<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    <style>
      #tap-to-start {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: rgba(0,0,0,0.7);
        color: white;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: sans-serif;
        font-size: 24px;
        z-index: 999;
        cursor: pointer;
      }
    </style>
  </head>
  <body style="margin:0; overflow:hidden;">

    <div id="tap-to-start">Tap to Start</div>

    <a-scene
      mindar-image="imageTargetSrc: ./targets.mind;"
      color-space="sRGB"
      renderer="colorManagement: true"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
    >
      <a-assets>
        <!-- aloe1: 4800x6000 -->
        <video id="video-0" src="./aloe1.mp4" loop muted playsinline></video>
        <!-- FLOWER2: 4096x4096 -->
        <video id="video-1" src="./flower2.mp4" loop muted playsinline></video>
        <!-- separation3: 6000x6000 -->
        <video id="video-2" src="./separation3.mp4" loop muted playsinline></video>
        <!-- TERRAIN4: 4800x6000 -->
        <video id="video-3" src="./terrain4.mp4" loop muted playsinline></video>
        <!-- TRAILS5: 6000x6000 -->
        <video id="video-4" src="./trails5.mp4" loop muted playsinline></video>
        <!-- DIGFLOWER6: 6000x6000 -->
        <video id="video-5" src="./digflower6.mp4" loop muted playsinline></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <!-- aloe1 (4800x6000 → height = 6000/4800 = 1.25) -->
      <a-entity mindar-image-target="targetIndex: 0">
        <a-video src="#video-0" position="0 0 0.001" width="1" height="1.25"></a-video>
      </a-entity>

      <!-- FLOWER2 (4096x4096 → square) -->
      <a-entity mindar-image-target="targetIndex: 1">
        <a-video src="#video-1" position="0 0 0.001" width="1" height="1"></a-video>
      </a-entity>

      <!-- separation3 (6000x6000 → square) -->
      <a-entity mindar-image-target="targetIndex: 2">
        <a-video src="#video-2" position="0 0 0.001" width="1" height="1"></a-video>
      </a-entity>

      <!-- TERRAIN4 (4800x6000 → height = 6000/4800 = 1.25) -->
      <a-entity mindar-image-target="targetIndex: 3">
        <a-video src="#video-3" position="0 0 0.001" width="1" height="1.25"></a-video>
      </a-entity>

      <!-- TRAILS5 (6000x6000 → square) -->
      <a-entity mindar-image-target="targetIndex: 4">
        <a-video src="#video-4" position="0 0 0.001" width="1" height="1"></a-video>
      </a-entity>

      <!-- DIGFLOWER6 (6000x6000 → square) -->
      <a-entity mindar-image-target="targetIndex: 5">
        <a-video src="#video-5" position="0 0 0.001" width="1" height="1"></a-video>
      </a-entity>

    </a-scene>

    <script>
      const overlay = document.getElementById('tap-to-start');
      const videos = [
        document.getElementById('video-0'),
        document.getElementById('video-1'),
        document.getElementById('video-2'),
        document.getElementById('video-3'),
        document.getElementById('video-4'),
        document.getElementById('video-5'),
      ];

      // On tap, play all videos so they're ready when a target is found
      overlay.addEventListener('click', () => {
        videos.forEach(v => v.play().catch(e => console.warn('Video play failed:', e)));
        overlay.style.display = 'none';
      });

      // Re-trigger all on any target found
      const scene = document.querySelector('a-scene');
      scene.addEventListener('targetFound', () => {
        videos.forEach(v => v.play().catch(e => console.warn('Video play failed:', e)));
      });
    </script>

  </body>
</html>
